services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: streka
      POSTGRES_PASSWORD: streka
      POSTGRES_DB: streka
    ports:
      - "5432:5432"
    volumes:
      - streka_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streka"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  streka_pg:
